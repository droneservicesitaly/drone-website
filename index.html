<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- 1. Tells browsers to instantly forward to the new URL -->
    <meta http-equiv="refresh" content="0; url=https://www.internationalsymposium.it/">
    <link rel="canonical" href="https://www.internationalsymposium.it/">
    <title>Redirecting...</title>
</head>
<body>
    <!-- 2. Fallback link just in case a browser has redirects disabled -->
    <p>Redirecting you to <a href="https://www.internationalsymposium.it/">internationalsymposium.it</a>...</p>
    <script>
        // 3. JavaScript backup redirect to make sure it happens instantly
        window.location.href = "https://www.internationalsymposium.it/";
    </script>
</body>
</html>
